<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AreaGo — Gestión de Monotributo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="web-icons.jsx"></script>
  <script type="text/babel" src="web-components.jsx"></script>
  <script type="text/babel" src="web-screens-1.jsx"></script>
  <script type="text/babel" src="web-screens-2.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #F8FAFC;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100vh; }
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb { background: oklch(0.88 0.008 255); border-radius: 99px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: oklch(0.80 0.01 255); background-clip: padding-box; }
    ::-webkit-scrollbar-track { background: transparent; }
    button { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#27303f">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#27303f"/>
    <rect x="430" y="250" width="340" height="340" rx="60" fill="#ffffff"/>
    <text x="600" y="500" font-family="Inter, sans-serif" font-size="240" font-weight="800" fill="#27303f" text-anchor="middle">M</text>
  </svg>
</template>

<script type="text/babel">
// URL del backend — cambiar a la URL de producción cuando se despliegue
const API_BASE = 'http://localhost:3001/api';

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "userName": "María García",
  "cuit": "27-34567890-1",
  "categoria": "C",
  "estudio": "Estudio Contable XYZ"
}/*EDITMODE-END*/;

// Fallback usado cuando el backend no está disponible
const DEMO_FACTURAS = [
  { num: '0001-00000114', cliente: 'Tech Solutions S.A.',    cuit: '30-71234567-8', monto: 185000, fecha: '29/04/2026', tipo: 'C', concepto: 'Servicios de desarrollo web' },
  { num: '0001-00000113', cliente: 'Consultora ABC S.R.L.',  cuit: '30-69876543-2', monto: 320000, fecha: '28/04/2026', tipo: 'C', concepto: 'Consultoría estratégica' },
  { num: '0001-00000112', cliente: 'García & Asociados',     cuit: '27-34567890-1', monto: 95000,  fecha: '22/04/2026', tipo: 'C', concepto: 'Asesoramiento contable' },
  { num: '0001-00000111', cliente: 'Consumidor Final',       cuit: '—',             monto: 45000,  fecha: '15/04/2026', tipo: 'C', concepto: 'Servicios varios' },
];

const SCREEN_META = {
  dashboard:        { title: 'Resumen', subtitle: 'Tu situación tributaria de un vistazo' },
  factura:          { title: 'Facturación', subtitle: 'Emití y gestioná tus comprobantes' },
  vep:              { title: 'Generar VEP', subtitle: 'Volante Electrónico de Pago' },
  vencimientos:     { title: 'Vencimientos', subtitle: 'Agenda tributaria del año' },
  topes:            { title: 'Control de topes', subtitle: 'Seguimiento de facturación anual' },
  recategorizacion: { title: 'Recategorización', subtitle: 'Verificá tu categoría del monotributo' },
  derivar:          { title: 'Mi contador', subtitle: 'Derivá casos complejos al estudio' },
  perfil:           { title: 'Mi perfil', subtitle: 'Datos fiscales y preferencias' },
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState('dashboard');
  const [invoices, setInvoices] = React.useState([]);
  const [veps, setVeps] = React.useState([]);
  const [loadingData, setLoadingData] = React.useState(true);
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  const bp = useBreakpoint();
  const isDesktop = bp === 'lg';

  const navigate = (to) => { setScreen(to); setDrawerOpen(false); };
  const { userName, cuit, categoria, estudio } = tweaks;
  const meta = SCREEN_META[screen] || SCREEN_META.dashboard;
  const cuitNum = (cuit || '').replace(/\D/g, '');

  // Carga inicial de datos desde el backend
  React.useEffect(() => {
    if (!cuitNum) { setInvoices(DEMO_FACTURAS); setLoadingData(false); return; }

    Promise.all([
      fetch(`${API_BASE}/clientes/${cuitNum}`).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`${API_BASE}/facturas/${cuitNum}`).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`${API_BASE}/veps/${cuitNum}`).then(r => r.ok ? r.json() : null).catch(() => null),
    ]).then(([profile, facturas, vepsData]) => {
      if (profile) {
        if (profile.nombre)    setTweak('userName', profile.nombre);
        if (profile.categoria) setTweak('categoria', profile.categoria);
        if (profile.estudio)   setTweak('estudio', profile.estudio);
      }
      setInvoices(facturas && facturas.length ? facturas : DEMO_FACTURAS);
      if (vepsData) setVeps(vepsData);
    }).finally(() => setLoadingData(false));
  }, [cuitNum]);

  const addInvoice = React.useCallback((inv) => setInvoices(prev => [inv, ...prev]), []);
  const addVep = React.useCallback((vep) => setVeps(prev => [vep, ...prev]), []);
  const onCategoriaChange = React.useCallback((cat) => setTweak('categoria', cat), [setTweak]);
  const onPerfilUpdate = React.useCallback((updates) => {
    if (updates.nombre)    setTweak('userName', updates.nombre);
    if (updates.categoria) setTweak('categoria', updates.categoria);
    if (updates.estudio)   setTweak('estudio', updates.estudio);
  }, [setTweak]);

  const renderScreen = () => {
    const p = { navigate, userName, cuit, categoria, estudio, invoices, addInvoice, veps, addVep, onCategoriaChange, onPerfilUpdate, loadingData };
    switch (screen) {
      case 'dashboard':        return <WebDashboard {...p} />;
      case 'factura':          return <WebFactura {...p} />;
      case 'vep':              return <WebVep {...p} />;
      case 'vencimientos':     return <WebVencimientos {...p} />;
      case 'topes':            return <WebTopes {...p} />;
      case 'recategorizacion': return <WebRecategorizacion {...p} />;
      case 'derivar':          return <WebDerivar {...p} />;
      case 'perfil':           return <WebPerfil {...p} />;
      default:                 return <WebDashboard {...p} />;
    }
  };

  return (
    <>
      <div style={{ height: '100vh', display: 'flex', overflow: 'hidden' }}>
        {isDesktop && (
          <Sidebar active={screen} onNavigate={navigate} userName={userName} categoria={categoria} estudio={estudio} />
        )}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, position: 'relative' }}>
          {isDesktop ? (
            <Topbar title={meta.title} subtitle={meta.subtitle} onNotif={() => {}}
              actions={screen === 'dashboard' ? (
                <Btn variant="primary" onClick={() => navigate('factura')}><Icon name="plus" size={16} color="#fff" /> Nueva factura</Btn>
              ) : null} />
          ) : (
            <MobileHeader title={meta.title} onMenu={() => setDrawerOpen(true)} onNotif={() => {}} />
          )}
          {renderScreen()}
          {!isDesktop && <BottomNav active={screen} onNavigate={navigate} />}
        </div>
      </div>

      {/* Mobile/tablet sidebar drawer */}
      {!isDesktop && drawerOpen && (
        <div onClick={() => setDrawerOpen(false)} style={{
          position: 'fixed', inset: 0, zIndex: 300,
          background: 'rgba(30,38,54,0.5)',
          display: 'flex',
        }}>
          <div onClick={e => e.stopPropagation()} style={{ width: 280, height: '100%', flexShrink: 0 }}>
            <Sidebar active={screen} onNavigate={navigate} userName={userName} categoria={categoria} estudio={estudio} />
          </div>
        </div>
      )}

      <TweaksPanel tweaks={tweaks} setTweak={setTweak}>
        <TweakSection title="Contribuyente">
          <TweakText id="userName" label="Nombre" value={tweaks.userName} onChange={v => setTweak('userName', v)} />
          <TweakText id="cuit" label="CUIT" value={tweaks.cuit} onChange={v => setTweak('cuit', v)} />
          <TweakSelect id="categoria" label="Categoría" value={tweaks.categoria}
            options={['A','B','C','D','E','F','G'].map(c => ({ label: `Categoría ${c}`, value: c }))}
            onChange={v => setTweak('categoria', v)} />
          <TweakText id="estudio" label="Estudio contable" value={tweaks.estudio} onChange={v => setTweak('estudio', v)} />
        </TweakSection>
        <TweakSection title="Navegación">
          <TweakSelect id="screen" label="Ir a sección" value={screen}
            options={[
              { label: 'Resumen', value: 'dashboard' },
              { label: 'Facturación', value: 'factura' },
              { label: 'Generar VEP', value: 'vep' },
              { label: 'Vencimientos', value: 'vencimientos' },
              { label: 'Topes', value: 'topes' },
              { label: 'Recategorización', value: 'recategorizacion' },
              { label: 'Mi contador', value: 'derivar' },
              { label: 'Perfil', value: 'perfil' },
            ]}
            onChange={v => setScreen(v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
