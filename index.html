<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AreaGo — Gestión de Monotributo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="web-icons.jsx"></script>
  <script type="text/babel" src="web-components.jsx"></script>
  <script type="text/babel" src="web-screens-1.jsx"></script>
  <script type="text/babel" src="web-screens-2.jsx"></script>
  <script type="text/babel" src="web-login.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #F8FAFC;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100vh; }
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb { background: oklch(0.88 0.008 255); border-radius: 99px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: oklch(0.80 0.01 255); background-clip: padding-box; }
    ::-webkit-scrollbar-track { background: transparent; }
    button { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#27303f">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#27303f"/>
    <rect x="430" y="250" width="340" height="340" rx="60" fill="#ffffff"/>
    <text x="600" y="500" font-family="Inter, sans-serif" font-size="240" font-weight="800" fill="#27303f" text-anchor="middle">M</text>
  </svg>
</template>

<script type="text/babel">
const API_BASE = '/api';

const SCREEN_META = {
  dashboard:        { title: 'Resumen', subtitle: 'Tu situación tributaria de un vistazo' },
  factura:          { title: 'Facturación', subtitle: 'Emití y gestioná tus comprobantes' },
  vep:              { title: 'Generar VEP', subtitle: 'Volante Electrónico de Pago' },
  vencimientos:     { title: 'Vencimientos', subtitle: 'Agenda tributaria del año' },
  topes:            { title: 'Control de topes', subtitle: 'Seguimiento de facturación anual' },
  recategorizacion: { title: 'Recategorización', subtitle: 'Verificá tu categoría del monotributo' },
  derivar:          { title: 'Mi contador', subtitle: 'Derivá casos complejos al estudio' },
  perfil:           { title: 'Mi perfil', subtitle: 'Datos fiscales y preferencias' },
};

// ─── Auth helpers ─────────────────────────────────────────────────────────────

function getStoredSession() {
  try { return JSON.parse(localStorage.getItem('areago_session') || 'null'); } catch { return null; }
}
function storeSession(s) { localStorage.setItem('areago_session', JSON.stringify(s)); }
function clearSession()   { localStorage.removeItem('areago_session'); }

function authHeader(token) {
  return { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };
}

// ─── ClientApp — app principal del cliente ───────────────────────────────────

function ClientApp({ session, onLogout }) {
  const { token, user } = session;
  const [screen, setScreen] = React.useState('dashboard');
  const [userName, setUserName]   = React.useState(user.perfil?.nombre || user.email);
  const [cuit, setCuit]           = React.useState(user.cuit ? user.cuit.replace(/(\d{2})(\d{8})(\d{1})/, '$1-$2-$3') : '');
  const [categoria, setCategoria] = React.useState(user.perfil?.categoria || 'C');
  const [estudio, setEstudio]     = React.useState(user.perfil?.estudio || '');
  const [invoices, setInvoices]   = React.useState([]);
  const [veps, setVeps]           = React.useState([]);
  const [loadingData, setLoadingData] = React.useState(true);
  const [drawerOpen, setDrawerOpen]   = React.useState(false);
  const bp = useBreakpoint();
  const isDesktop = bp === 'lg';

  const navigate = (to) => { setScreen(to); setDrawerOpen(false); };
  const meta = SCREEN_META[screen] || SCREEN_META.dashboard;
  const cuitNum = (cuit || '').replace(/\D/g, '');
  const h = authHeader(token);

  React.useEffect(() => {
    if (!cuitNum) { setLoadingData(false); return; }
    Promise.all([
      fetch(`${API_BASE}/facturas/${cuitNum}`, { headers: h }).then(r => r.ok ? r.json() : []).catch(() => []),
      fetch(`${API_BASE}/veps/${cuitNum}`, { headers: h }).then(r => r.ok ? r.json() : []).catch(() => []),
    ]).then(([facturas, vepsData]) => {
      setInvoices(Array.isArray(facturas) ? facturas : []);
      setVeps(Array.isArray(vepsData) ? vepsData : []);
    }).finally(() => setLoadingData(false));
  }, [cuitNum, token]);

  const addInvoice = React.useCallback((inv) => setInvoices(prev => [inv, ...prev]), []);
  const addVep     = React.useCallback((vep) => setVeps(prev => [vep, ...prev]), []);
  const onCategoriaChange = React.useCallback((cat) => setCategoria(cat), []);
  const onPerfilUpdate    = React.useCallback((updates) => {
    if (updates.nombre)    setUserName(updates.nombre);
    if (updates.categoria) setCategoria(updates.categoria);
    if (updates.estudio)   setEstudio(updates.estudio);
  }, []);

  const renderScreen = () => {
    const p = { navigate, userName, cuit, categoria, estudio, invoices, addInvoice, veps, addVep,
                onCategoriaChange, onPerfilUpdate, loadingData, token };
    switch (screen) {
      case 'dashboard':        return <WebDashboard {...p} />;
      case 'factura':          return <WebFactura {...p} />;
      case 'vep':              return <WebVep {...p} />;
      case 'vencimientos':     return <WebVencimientos {...p} />;
      case 'topes':            return <WebTopes {...p} />;
      case 'recategorizacion': return <WebRecategorizacion {...p} />;
      case 'derivar':          return <WebDerivar {...p} />;
      case 'perfil':           return <WebPerfil {...p} />;
      default:                 return <WebDashboard {...p} />;
    }
  };

  return (
    <>
      <div style={{ height: '100vh', display: 'flex', overflow: 'hidden' }}>
        {isDesktop && (
          <Sidebar active={screen} onNavigate={navigate} userName={userName} categoria={categoria} estudio={estudio} onLogout={onLogout} />
        )}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, position: 'relative' }}>
          {isDesktop ? (
            <Topbar title={meta.title} subtitle={meta.subtitle} onNotif={() => {}}
              actions={screen === 'dashboard' ? (
                <Btn variant="primary" onClick={() => navigate('factura')}><Icon name="plus" size={16} color="#fff" /> Nueva factura</Btn>
              ) : null} />
          ) : (
            <MobileHeader title={meta.title} onMenu={() => setDrawerOpen(true)} onNotif={() => {}} />
          )}
          {renderScreen()}
          {!isDesktop && <BottomNav active={screen} onNavigate={navigate} />}
        </div>
      </div>

      {!isDesktop && drawerOpen && (
        <div onClick={() => setDrawerOpen(false)} style={{
          position: 'fixed', inset: 0, zIndex: 300, background: 'rgba(30,38,54,0.5)', display: 'flex',
        }}>
          <div onClick={e => e.stopPropagation()} style={{ width: 280, height: '100%', flexShrink: 0 }}>
            <Sidebar active={screen} onNavigate={navigate} userName={userName} categoria={categoria} estudio={estudio} onLogout={onLogout} />
          </div>
        </div>
      )}
    </>
  );
}

// ─── App root ────────────────────────────────────────────────────────────────

function App() {
  const [session, setSession] = React.useState(() => getStoredSession());
  const [checking, setChecking] = React.useState(!!getStoredSession());

  // Validate stored token on load
  React.useEffect(() => {
    if (!session) return;
    fetch(`${API_BASE}/auth/me`, { headers: authHeader(session.token) })
      .then(r => r.ok ? r.json() : null)
      .then(user => {
        if (!user) { clearSession(); setSession(null); }
        else {
          // Refresh user data in session
          const updated = { ...session, user: { ...session.user, ...user } };
          storeSession(updated);
          setSession(updated);
        }
      })
      .catch(() => { /* network error — keep session, will fail on next API call */ })
      .finally(() => setChecking(false));
  }, []);

  const handleLogin = (data) => {
    const s = { token: data.token, user: data.user };
    storeSession(s);
    setSession(s);
  };

  const handleLogout = () => {
    clearSession();
    setSession(null);
  };

  if (checking) {
    return (
      <div style={{ minHeight: '100vh', background: '#1E2636', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontFamily: 'Sora, sans-serif', fontSize: 18, fontWeight: 700, color: '#fff' }}>AreaGo</div>
      </div>
    );
  }

  if (!session) return <LoginScreen onLogin={handleLogin} />;
  if (session.user?.isAdmin) return <AdminPanel token={session.token} adminUser={session.user} onLogout={handleLogout} />;
  return <ClientApp session={session} onLogout={handleLogout} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
